<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #1a1a1a;
        }
        .container {
            text-align: center;
        }
        .icons {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .clock {
            animation: ticktack 2s infinite ease-in-out;
        }
        .worker {
            animation: work 0.8s infinite ease-in-out;
        }
        /* Animace tikání hodin */
        @keyframes ticktack {
            0% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }
        /* Animace pracujícího panáčka */
        @keyframes work {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(-10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .message {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 2px;
            line-height: 1.8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icons">
            <span class="clock">🕒</span>
            <span class="worker">👷‍♂️</span>
        </div>
        <div class="message">
            STRÁNKA SE PŘIPRAVUJE, BRZY BUDE SPUŠTĚNA<br>
            Under construction. Coming soon
        </div>
    </div>
</body>
</html>
