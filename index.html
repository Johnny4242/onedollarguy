<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff; /* Čistě bílé pozadí */
            color: #333333; /* Tmavě šedé písmo pro dobrou čitelnost */
        }
        .message {
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem; /* Velikost písma */
            letter-spacing: 1px; /* Mírné rozestupy mezi písmeny pro lepší vzhled */
            line-height: 1.6;
            text-transform: uppercase; /* Automaticky převede na velké dopisy (CAPSLOCK) */
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="message">
        STRÁNKA SE PŘIPRAVUJE, BRZY BUDE SPUŠTĚNA<br>
        Under construction. Coming soon
    </div>
</body>
</html>
